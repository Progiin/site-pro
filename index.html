<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaTech</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  background: #111;
}

.logo {
  font-weight: bold;
  font-size: 20px;
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

.hero {
  height: 90vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #6c5ce7, #00cec9);
}

.hero h1 {
  font-size: 48px;
}

.hero button {
  padding: 15px 30px;
  border: none;
  background: black;
  color: white;
  margin-top: 20px;
  cursor: pointer;
}

.section {
  padding: 60px;
  text-align: center;
}

.card {
  background: #1a1a1a;
  padding: 20px;
  margin: 10px;
  border-radius: 10px;
  display: inline-block;
  width: 250px;
}
</style>
</head>

<body>

<header>
  <div class="logo">NovaTech</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Serviços</a>
    <a href="#">Contato</a>
  </nav>
</header>

<section class="hero">
  <h1>Construa o futuro</h1>
  <p>Sites modernos e sistemas inteligentes</p>
  <button onclick="alert('🔥 Você clicou!')">Começar</button>
</section>

<section class="section">
  <h2>Serviços</h2>

  <div class="card">💻 Desenvolvimento Web</div>
  <div class="card">⚡ Automação</div>
  <div class="card">🤖 Integração com IA</div>
</section>

</body>
</html>
